name: Java CI

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Setup Java 17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          java-package: jdk+fx

      # Step 3: Validate Gradle Wrapper
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      # Step 4: Build project and shadowJar
      - name: Build shadow jar and run checks
        run: ./gradlew shadowJar check

      # Step 5: List jar files (debugging)
      - name: List built jar files
        run: ls -l build/libs

      # Step 6: Install dos2unix for Linux/macOS
      - name: Install dos2unix (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y dos2unix

      - name: Install dos2unix (macOS)
        if: runner.os == 'macOS'
        run: brew install dos2unix

      # Step 7: Make sure shell script is executable (Linux/macOS)
      - name: Make runtest.sh executable
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: chmod +x text-ui-test/runtest.sh

      # Step 8: Run the text-ui-test (*NIX)
      - name: Perform IO redirection test (*NIX)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        working-directory: text-ui-test
        run: ./runtest.sh

      # Step 9: Run the text-ui-test (Windows)
      - name: Perform IO redirection test (Windows)
        if: runner.os == 'Windows'
        working-directory: text-ui-test
        shell: cmd
        run: runtest.bat
